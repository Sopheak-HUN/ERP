name: ${COMPOSE_PROJECT_NAME:-erp}

services:
  # ---------------------------------------------------------------------------
  # PHP-FPM 8.3 (Laravel backend)
  # ---------------------------------------------------------------------------
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-erp}-php
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - composer_cache:/root/.composer/cache
    env_file:
      - .env
    environment:
      PHP_IDE_CONFIG: "serverName=erp"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - erp

  # ---------------------------------------------------------------------------
  # Nginx — fronts both /api (php-fpm) and / (nuxt dev server)
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-erp}-nginx
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - php
      - node
    networks:
      - erp

  # ---------------------------------------------------------------------------
  # Horizon — Laravel queue dashboard (runs `php artisan horizon`)
  # ---------------------------------------------------------------------------
  horizon:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-erp}-horizon
    working_dir: /var/www/html
    command: ["php", "artisan", "horizon"]
    volumes:
      - ./backend:/var/www/html
    env_file:
      - .env
    depends_on:
      - php
      - redis
    networks:
      - erp

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-erp}-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-erp}
      POSTGRES_USER: ${DB_USERNAME:-erp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-erp_secret_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-erp} -d ${DB_DATABASE:-erp}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - erp

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-erp}-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - erp

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object store
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME:-erp}-minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-erp_minio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-erp_minio_secret_change_me}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp

  # ---------------------------------------------------------------------------
  # Meilisearch
  # ---------------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: ${COMPOSE_PROJECT_NAME:-erp}-meilisearch
    ports:
      - "${MEILI_PORT:-7700}:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-erp_meili_master_key_change_me}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp

  # ---------------------------------------------------------------------------
  # Node — Nuxt dev container
  # ---------------------------------------------------------------------------
  node:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-erp}-node
    working_dir: /app
    ports:
      - "${NUXT_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8080/api/v1}
    command: ["sh", "-c", "pnpm install --frozen-lockfile=false && pnpm dev --host 0.0.0.0"]
    networks:
      - erp

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meili_data:
  composer_cache:
  node_modules:
  pnpm_store:

networks:
  erp:
    driver: bridge
